name: dart_ast_node_viewer
description: "A simple Dart AST node viewer."
publish_to: "none"
version: 0.4.0+1

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

dependencies:
  analyzer: ^9.0.0
  collection: ^1.19.1
  # Temporary fix for https://github.com/flutter/flutter/issues/119074
  cupertino_icons: ^1.0.9
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  meta: ^1.18.0
  package_info_plus: ^10.1.0
  pub_semver: ^2.2.0
  re_editor:
    git:
      ref: 37fe017
      url: https://github.com/charlescyt/re-editor.git
  re_highlight: ^0.0.3
  remix_icons_flutter: ^4.9.2
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  two_dimensional_scrollables: ^0.5.2
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.15.0
  choco_lints:
    git:
      ref: v1.9.1
      url: https://github.com/charlescyt/choco_lints.git
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Lato/
    - assets/fonts/JetBrainsMono/
    - assets/images/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato/Lato-Regular.ttf
        - asset: assets/fonts/Lato/Lato-Bold.ttf
          weight: 700

    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
